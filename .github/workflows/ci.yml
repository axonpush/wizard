name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node -c bin/axonpush-wizard.mjs
      - run: node --test --experimental-test-coverage 2>/dev/null || true
